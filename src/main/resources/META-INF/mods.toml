modLoader="javafml"
loaderVersion="[40,)"
license="MIT"

[[mods]]
  modId="vhcctweaks"
  version="${file.jarVersion}"
  displayName="VH CC Tweaks"
  description='''
Balances CC:Tweaked and Advanced Peripherals for Vault Hunters 3rd Edition.

Core Features:
- Research gates for CC:Tweaked and Advanced Peripherals in the VH skill tree
- Mixin-level block on turtle.craft() until Automatic Genius is researched
- Inventory sweep strips crafting upgrade from turtle items as backup
- All CC and AP blocks/items blocked inside the Vault dimension
- 20 recipe overrides requiring Chromatic Iron/Steel from vaults
- HTTP API and WebSockets fully disabled
- Wireless modem range reduced, command computers disabled

Security Mixins:
- Blocks isSlimeChunk() to prevent world seed reverse-engineering
- Removes hidden $ chat channel from AP ChatBox events
- Blocks sendFormattedMessage to prevent message spoofing

AP Config Patches:
- Disables chunk loading, geo scanning, block reading, inventory management
- Disables end automata and husbandry automata cores
- Increases overpowered automata break chance to 5%%

Custom Lua API:
- Sandboxed filesystem API (vhcc) on all CC computers
- Server-side and client-side file operations
- Strict path validation and write limits
'''

[[mixins]]
  config="vhcctweaks.mixins.json"

[[dependencies.vhcctweaks]]
  modId="forge"
  mandatory=true
  versionRange="[40,)"
  ordering="NONE"
  side="BOTH"

[[dependencies.vhcctweaks]]
  modId="minecraft"
  mandatory=true
  versionRange="[1.18.2,1.19)"
  ordering="NONE"
  side="BOTH"

[[dependencies.vhcctweaks]]
  modId="computercraft"
  mandatory=true
  versionRange="[1.101,)"
  ordering="AFTER"
  side="BOTH"

[[dependencies.vhcctweaks]]
  modId="the_vault"
  mandatory=false
  versionRange="[0,)"
  ordering="AFTER"
  side="BOTH"

[[dependencies.vhcctweaks]]
  modId="advancedperipherals"
  mandatory=false
  versionRange="[0,)"
  ordering="AFTER"
  side="BOTH"
